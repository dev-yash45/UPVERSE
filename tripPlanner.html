<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>UPVERSE • AI Trip Planner</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/tripPlanner.css">
    

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->

    <div id="navbar"></div>

    <!-- HERO -->

    <section class="planner-hero">

        <span class="hero-badge">
            ✨ AI Powered
        </span>

        <h1>

            Plan Your Perfect Trip

        </h1>

        <p>

            Get a personalized itinerary,
            hotel recommendations,
            food suggestions,
            budget estimation
            and travel tips generated by AI.

        </p>

    </section>

    <!-- FORM -->

    <section class="planner-container">

        <div class="planner-card">

            <h2>

                Travel Details

            </h2>

            <form id="tripPlannerForm">

                <!-- DISTRICT -->

                <div class="form-group">

                    <label>

                        Destination

                    </label>

                    <input

                        type="text"

                        id="district"

                        readonly

                    >

                </div>
                
                <div class="form-group">

    <label>

        Starting Location

    </label>

    <div class="location-input">

        <input
            type="text"
            id="startingLocation"
            placeholder="Enter your city">

        <button
            type="button"
            id="detectLocationBtn">

            📍 Use My Location

        </button>

    </div>

    <small
        id="locationStatus">

    </small>

</div>

                <!-- DATE -->

                <div class="grid-2">

                    <div class="form-group">

                        <label>

                            Start Date

                        </label>

                        <input

                            type="date"

                            id="startDate"

                        >

                    </div>

                    <div class="form-group">

                        <label>

                            Duration

                        </label>

                        <select id="duration">

                            <option value="1 Day">1 Day</option>
                            <option value="2 Days">2 Days</option>
                            <option value="3 Days">3 Days</option>
                            <option value="4 Days">4 Days</option>
                            <option value="5 Days">5 Days</option>
                            <option value="1 Week">1 Week</option>
                            <option value="1-2 Months">1-2 Months</option>

                        </select>

                    </div>

                </div>

                <!-- BUDGET -->

                <div class="form-group">

                    <label>

                        Budget

                    </label>

                    <select id="budget">

                      <option value="Below ₹3000">Below ₹3000</option>
                      <option value="₹3000–₹7000">₹3000–₹7000</option>
                      <option value="₹7000–₹15000">₹7000–₹15000</option>
                      <option value="Luxury">Luxury</option>

                      </select>

                </div>

                <!-- TRAVELLERS -->

                <div class="form-group">

                    <label>

                        Travellers

                    </label>

                    <input type="number" id="travellers" min="1" max="20" placeholder="Number of travellers">

                </div>

                <!-- STYLE -->

                <div class="form-group">

                    <label>

                        Travel Style

                    </label>

                    <select id="style">

                        <option>Mixed</option>
                        <option>Adventure</option>
                        <option>Nature</option>
                        <option>Photography</option>
                        <option>Heritage</option>
                        <option>Food</option>
                        <option>Spiritual</option>
                        <option>For Couples</option>

                    </select>

                </div>

                <!-- STAY -->

                <div class="grid-2">

                    <div class="form-group">

                        <label>

                            Stay

                        </label>

                        <select id="stay">

                          <option>Hotel</option>
                          <option>Resort</option>
                          <option>Homestay</option>
                          <option>Hostel</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>

                            Transport

                        </label>

                        <select id="transport">

                            <option>Car</option>
                            <option>Bike</option>
                            <option>Bus</option>
                            <option>Train</option>
                            <option>Flight</option>

                        </select>

                    </div>

                </div>

                <!-- FOOD -->

                <div class="form-group">

                    <label>

                        Food Preference

                    </label>

                    <select id="food">

                        <option>Veg</option>
                        <option>Non Veg</option>
                        <option>Both</option>

                    </select>

                </div>

                <!-- SPECIAL -->

                <div class="form-group">

                    <label>

                        Special Requests

                    </label>

                    <textarea

                        id="special"

                        rows="5"

                        placeholder="Example : Avoid crowded places, suggest hidden gems..."

                    ></textarea>

                </div>

                <!-- BUTTON -->

                <button

                    type="submit"

                    class="generate-btn"

                >

                    ✨ Generate AI Trip Plan

                </button>

            </form>

        </div>

    </section>

    <!-- RESULT -->

    <section

        id="tripResult"

        class="trip-result"

    >
    
    </section>
    
    <!-- ==========================================================
     AI PLANNING
========================================================== -->

<section
class="trip-ai-section hidden"
id="tripAISection">

    <div class="trip-ai-card">

        <div class="trip-ai-header">

            <div class="trip-ai-icon">

                🤖

            </div>

            <div>

                <h2>

                    UPVerse AI

                </h2>

                <p>

                    Creating your perfect travel experience...

                </p>

            </div>

        </div>

        <div class="trip-progress">

            <div
            id="tripProgressFill">

            </div>

        </div>

        <div
        id="tripProgressPercent">

            0%

        </div>

        <div
        id="tripPlanningMessage">

            Initializing AI...

        </div>

        <div
        id="tripPlanningSteps">

            <!-- JS -->

        </div>

    </div>

</section>



<!-- ==========================================================
     AI RESULT
========================================================== -->

<section

id="tripResult"

class="trip-result hidden">

    <!-- JS -->

</section>

    <script src="js/api.js"></script>
    <script src="js/tripPlanner.js"></script>
    <script src="js/tripRender.js"></script>

</body>

</html>
